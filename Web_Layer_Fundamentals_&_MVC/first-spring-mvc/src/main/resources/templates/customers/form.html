<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"] {
            width: 300px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .error { color: red; font-size: 12px; }
        .btn {
            padding: 10px 20px;
            text-decoration: none;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        .btn-save { background-color: #4CAF50; }
        .btn-cancel { background-color: #f44336; }
        h1 { color: #333; }
    </style>
</head>
<body>
<h1 th:text="${customer.id} ? 'Edit Customer' : 'New Customer'">Customer Form</h1>

<form th:action="${customer.id} ? @{/customers/update/{id}(id=${customer.id})} : @{/customers}"
      th:object="${customer}"
      method="post">

    <input type="hidden" th:field="*{id}">

    <div class="form-group">
        <label>Name:</label>
        <input type="text" th:field="*{name}">
        <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
    </div>

    <div class="form-group">
        <label>Email:</label>
        <input type="email" th:field="*{email}">
        <span class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
    </div>

    <div class="form-group">
        <label>Phone:</label>
        <input type="text" th:field="*{phone}">
        <span class="error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></span>
    </div>

    <button type="submit" class="btn btn-save">Save</button>
    <a href="/customers" class="btn btn-cancel">Cancel</a>
</form>
</body>
</html>
