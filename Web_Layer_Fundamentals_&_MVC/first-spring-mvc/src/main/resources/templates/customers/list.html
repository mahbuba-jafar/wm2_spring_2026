<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customers</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .btn {
            padding: 8px 16px;
            text-decoration: none;
            color: white;
            border-radius: 4px;
            display: inline-block;
            margin: 2px;
        }
        .btn-add { background-color: #4CAF50; }
        .btn-edit { background-color: #2196F3; }
        .btn-delete { background-color: #f44336; }
        h1 { color: #333; }
    </style>
</head>
<body>
<h1>Customer List</h1>

<!-- Search Form -->
<form th:action="@{/customers}" method="get" style="margin-bottom: 20px;">
    <input type="text" name="keyword" th:value="${keyword}" placeholder="Search by name..." style="padding: 8px; width: 300px;">
    <button type="submit" class="btn btn-add">Search</button>
    <a th:href="@{/customers}" class="btn btn-cancel">Clear</a>
</form>

<a href="/customers/new" class="btn btn-add">Add New Customer</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="customer : ${customers}">
        <td th:text="${customer.id}">1</td>
        <td th:text="${customer.name}">John</td>
        <td th:text="${customer.email}">john@email.com</td>
        <td th:text="${customer.phone}">1234567890</td>
        <td>
            <a th:href="@{/customers/edit/{id}(id=${customer.id})}" class="btn btn-edit">Edit</a>
            <a th:href="@{/customers/delete/{id}(id=${customer.id})}" class="btn btn-delete" onclick="return confirm('Delete?')">Delete</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
