spring:
  config:
    activate:
      on-profile: dev-h2

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data3/empDB;DB_CLOSE_DELAY=-1
    username: admin
    password: admin123
    hikari:
      maximum-pool-size: 100
      minimum-idle: 10

  h2:
    console:
      enabled: true
      path: /h2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.hibernate.format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

server:
  port: 9092

logging:
  level:
    root: INFO
